networks:
  application:
    driver: bridge

services:
  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - application

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-root}
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - application
    restart: unless-stopped
    depends_on:
      - db
  netnext:
    build:
      context: ./netnext-project
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    networks:
      - application
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nextjs-app:
    image: rourory/daily-astro:latest
    container_name: nextjs-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CRON_SECRET: ${CRON_SECRET}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      TEST_PAYMENT: ${TEST_PAYMENT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    networks:
      - application
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - application
    depends_on:
      - nextjs-app
      - pgadmin
      - netnext

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - application
    restart: unless-stopped

  scheduler:
    image: mcuadros/ofelia:latest
    container_name: scheduler
    depends_on:
      - nextjs-app
    networks:
      - application
    # ДОБАВЛЕНО: флаг --docker говорит Ofelia искать настройки в лейблах
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      # Позволяем Ofelia читать лейблы этого контейнера
      ofelia.enabled: "true"

      # Перезагрузка nginx для подхвата новых ssl сертификатов
      ofelia.job-exec.nginx-reload.schedule: "@weekly"
      ofelia.job-exec.nginx-reload.command: "nginx -s reload"

      # Продление подписок (3:00 UTC)
      ofelia.job-local.sub-cron.schedule: "0 0 3 * * *"
      ofelia.job-local.sub-cron.command: "curl -X GET -H 'Authorization: Bearer ${CRON_SECRET}' http://nextjs-app:3000/api/subscribe/cron"

      # Прогнозы (каждый час с 4 до 18 UTC)
      ofelia.job-local.forecast-cron.schedule: "0 0 4-18 * * *"
      ofelia.job-local.forecast-cron.command: "curl -X GET -H 'Authorization: Bearer ${CRON_SECRET}' http://nextjs-app:3000/api/forecasts/cron"

volumes:
  postgres_data:
  pgadmin-data:
